aid: parcelsapp
url: https://raw.githubusercontent.com/api-evangelist/parcelsapp/refs/heads/main/apis.yml
name: Parcels App
kind: company
description: Parcels App (parcelsapp.com) is a universal parcel tracking service that
  tracks packages, air cargo (AWB), road freight (LTL/FTL), and sea freight across
  1,540 postal operators, couriers, and logistics carriers worldwide - USPS, UPS,
  FedEx, DHL, Royal Mail, China Post, Cainiao, 4PX, and many more. The Parcels API
  v3 is an asynchronous shipment tracking API - create a tracking request, then
  poll by UUID or receive webhook callbacks until results are complete - with
  automatic carrier detection, localized tracking events, and cached results
  returned immediately.

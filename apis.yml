apis:
- aid: parcelsapp:parcelsapp-shipments-tracking-api
  name: Parcels App Shipments Tracking API
  tags:
  - Parcel Tracking
  - Shipment Status
  - Package Tracking
  - Webhooks
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://parcelsapp.com/api-docs/
  baseURL: https://parcelsapp.com/api/v3
  properties:
  - url: https://parcelsapp.com/api-docs/
    type: Documentation
  - url: https://parcelsapp.com/api-docs/openapi.json
    type: APIReference
  - url: openapi/parcelsapp-openapi.yml
    type: OpenAPI
  description: Asynchronous multi-carrier shipment tracking. POST /shipments/tracking
    creates a tracking request for one or more tracking numbers (with automatic
    carrier detection across 1,540 carriers), returning a UUID and any cached
    results immediately; GET /shipments/tracking polls by UUID until done is true.
    Optionally pass a webhookUrl to receive shipment_completed and batch_completed
    JSON callbacks instead of polling. Returns shipment status, origin/destination,
    detected carrier, and a full timeline of tracking events.

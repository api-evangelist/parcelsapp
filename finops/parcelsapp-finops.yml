meters:
- name: unique_tracking_numbers
  description: Distinct tracking numbers added per billing month; the sole metered unit, capped at 300/500/1000 by tier with the counter reset each cycle.
  unit: shipments
  aggregation: sum
  dimensions:
  - account
  - plan
- name: tracking_requests
  description: POST/GET calls to /shipments/tracking; not billed directly, and repeat lookups of known numbers are served from cache without consuming quota.
  unit: requests
  aggregation: sum
  dimensions:
  - account
- name: webhook_deliveries
  description: shipment_completed and batch_completed callbacks delivered to your webhookUrl; no published per-delivery charge.
  unit: events
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Poll GET /account for plan, limit, current, and resetDate to watch quota burn-down in dashboards before the monthly reset.
- name: Allocation
  description: A single flat subscription covers the account; allocate cost internally by tagging which orders/teams generate the unique tracking numbers submitted.
- name: Optimization
  description: Deduplicate tracking numbers before submitting (only unique numbers consume quota), lean on cached results and webhooks instead of polling loops, and drop to the $49 postal-and-courier tier only if cargo/freight tracking is not needed.
- name: Accountability
  description: Right-size the tier each month against actual unique-shipment volume; there is no overage pricing, so sustained overshoot means a planned upgrade rather than surprise usage charges.

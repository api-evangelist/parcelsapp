description: >-
  FinOps view of Parcels API spend. The API is billed as a flat monthly
  subscription selected by tier - Pro 300 at $19, Premium 500 at $29, or Elite
  1000 at $49 per month - rather than per-call pricing. The consumed unit is
  the unique tracking number: each distinct tracking number added in a billing
  month counts once against the plan limit, regardless of how many times its
  status is polled, and the counter resets each cycle. Cargo and freight
  tracking (air AWB, road LTL/FTL, sea container/BL) is included on the $19
  and $29 tiers but excluded from the $49 postal-and-courier tier, so tier
  choice is a capability decision as well as a volume decision. Paid plans
  carry a 30-day no-questions-asked refund, and a pro-rated current-month
  refund is issued automatically on termination.
notes: >-
  Spend is predictable (flat monthly) until shipment volume forces a tier
  change; there is no published overage rate, so exceeding a limit means
  upgrading tiers. Monitor consumption programmatically via GET /account
  (plan, limit, current, resetDate). Prices confirmed on the API pricing page
  as of 2026-07-11.
